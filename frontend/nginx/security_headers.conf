# Shared security headers, included from every location block in default.conf.
# Why a snippet: nginx drops all inherited `add_header` directives the moment
# a child block defines its own, so server-level headers were silently lost in
# every location that set Cache-Control. Including this file in each location
# guarantees the headers actually reach the browser.
#
# CSP is intentionally Report-Only for the first roll-out — it lets the browser
# report violations without blocking, so we can validate the policy with real
# traffic before promoting to `Content-Security-Policy` (enforcement).

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' wss:; img-src 'self' data: blob:; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; font-src 'self' data:; form-action 'self'" always;
