services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: habit_tracker
      POSTGRES_USER: habit_user
      POSTGRES_PASSWORD: habit_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit_user -d habit_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql://habit_user:habit_pass@db:5432/habit_tracker
      REDIS_URL: redis://redis:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: https://localhost
      CSRF_TRUSTED_ORIGINS: https://localhost
      AUTH_REFRESH_COOKIE_SECURE: "true"
      AUTH_REFRESH_COOKIE_SAMESITE: Strict
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    environment:
      NGINX_SERVER_NAME: localhost
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
