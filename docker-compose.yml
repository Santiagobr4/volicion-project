services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habit_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-habit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend-media-init:
    image: busybox:1.36
    restart: "no"
    command:
      ["sh", "-c", "mkdir -p /media/avatars && chown -R 1000:1000 /media"]
    volumes:
      - backend_media:/media

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ENV: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-postgresql://habit_user:habit_pass@db:5432/habit_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://localhost}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      AUTH_REFRESH_COOKIE_SAMESITE: ${AUTH_REFRESH_COOKIE_SAMESITE:-Strict}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend-media-init:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
    # Healthcheck reports gunicorn liveness via the /api/healthz endpoint.
    # Notes:
    #  * urllib comes from the stdlib so the slim image needs no extra packages.
    #  * start_period is generous (collectstatic + gunicorn boot can take a
    #    while on small VPS hardware) so cold starts do not flap to unhealthy.
    #  * The frontend's `depends_on` is intentionally NOT upgraded to
    #    `service_healthy` — earlier attempt blocked Nginx from booting on a
    #    flaky healthcheck. This block stays informational/diagnostic.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/healthz', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - backend_media:/app/media

  backend-migrate:
    build:
      context: ./backend
    restart: "no"
    env_file:
      - ./backend/.env
    environment:
      ENV: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-postgresql://habit_user:habit_pass@db:5432/habit_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://localhost}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      AUTH_REFRESH_COOKIE_SAMESITE: ${AUTH_REFRESH_COOKIE_SAMESITE:-Strict}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend-media-init:
        condition: service_completed_successfully
    command: >
      sh -c "python manage.py migrate --noinput"
    volumes:
      - backend_media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    environment:
      NGINX_SERVER_NAME: localhost
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
      - backend_media:/mediafiles:ro

volumes:
  postgres_data:
  redis_data:
  backend_media:
